aid: amazon-freertos
name: Amazon FreeRTOS
description: >-
  Amazon FreeRTOS is an open source, real-time operating system for
  microcontrollers that makes it easy to program, deploy, secure, connect, and
  manage small, low-power edge devices. It extends the FreeRTOS kernel with
  libraries for secure connectivity, over-the-air updates, and more.
